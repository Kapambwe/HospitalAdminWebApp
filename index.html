<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HospitalAdmin.WebApp</title>
    <base href="/HospitalAdminWebApp/" id="dynamic-base">
    <script>
        // Dynamically adjust base path for Localhost vs GitHub Pages
        (function () {
            var base = document.getElementById('dynamic-base');
            var isGitHub = window.location.hostname.includes('github.io');
            var isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            
            if (isGitHub) {
                base.setAttribute('href', '/HospitalAdminWebApp/');
            } else if (isLocal) {
                base.setAttribute('href', '/');
            }
        })();
    </script>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="HospitalAdmin.WebApp.styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="_content/Radzen.Blazor/css/material-base.css" />
    <script src="qrcode-utils.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
    <script>
        // If redirected from 404.html, restore path
        (function () {
            const params = new URLSearchParams(window.location.search);
            const path = params.get('path');
            if (path) {
                window.history.replaceState(null, '', '/HospitalAdminWebApp' + decodeURIComponent(path));
            }
        })();
    </script>
</body>

</html>
